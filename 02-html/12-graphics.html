<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Canvas vs SVG</title>

    <!-- Fuente estilo retro -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e00, #ffb347);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor {
            background: #222;
            padding: 25px;
            border-radius: 10px;
            color: white;
            text-align: center;
            width: 260px;
        }

        canvas {
            display: block;
            margin: 10px auto;
        }

        /* 🔥 BOTÓN RETRO */
        .boton-inicio {
    position: fixed;   /* 🔥 lo fija en pantalla */
    top: 20px;         /* arriba */
    left: 20px;        /* izquierda */

    padding: 15px 25px;
    background-color: #a6a631;
    color: black;
    border: 3px solid white;
    border-radius: 10px;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 #666;
    transition: all 0.2s;
}

.boton-inicio:hover {
    background-color: #bfbf40;
}

.boton-inicio:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #666;
}
    </style>
</head>

<body>

<div class="contenedor">

    <h2>Canvas:</h2>
    <canvas id="miCanvas" width="200" height="200"></canvas>

    <h2>SVG:</h2>
    <svg width="200" height="200">
        <circle cx="100" cy="100" r="50" fill="red" />
        <text x="100" y="110" text-anchor="middle" fill="white" font-size="20">
            ADSO
        </text>
    </svg>

    <!-- 🔘 BOTÓN -->
    <button class="boton-inicio" onclick="accionBoton()">
    INICIO
</button>

</div>

<script>
    // Canvas
    window.onload = function() {
        const canvas = document.getElementById("miCanvas");
        const ctx = canvas.getContext("2d");

        ctx.beginPath();
        ctx.arc(100, 100, 50, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.closePath();
    };

    // Acción del botón
    function accionBoton() {
    window.history.back();
}
</script>

</body>
</html>
