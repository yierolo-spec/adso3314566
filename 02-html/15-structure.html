<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-Structure</title>
    <link rel="stylesheet" href=" ../src/css/02-html.">

<style>
    body {
        font-family: Arial, sans-serif;
    }

    #contenedor {
        width: 500px;
        margin: 40px auto;
        border: 2px solid #1aff00;
        padding: 20px;
        background: #fff700d0;
    }

    #contenedor div {
        border: 2px solid #dd00ff;
        background: #a8a8e0;
        color: #666;
        text-align: center;
        margin-bottom: 20px;
        padding: 40px 10px;
        font-size: 24px;
    }

    .encabezado {
        height: 80px;
    }

    .contenido {
        height: 180px;
    }

    .pie {
        height: 60px;
    }
</style>
<body>

    <main>
        <header>
            <h1>15-Structure</h1> <br>
            <h2>Defines layout with non-semantic tags (old style).</h2>
        </header>
    <section>
        <h3>Structure</h3>
        <p>The &lt;div&gt; element is used to group HTML elements together and apply styles to them.</p>
        <div id="contenedor">
        <div class="encabezado">encabezado</div>
        <div class="contenido">contenido</div>
        <div class="pie">pie</div>
</div>
    </section>
    </main>
