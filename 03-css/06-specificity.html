<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-Specificity</title>
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

       
        section {
            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 40vh; 
            padding: 1rem;
        }

        
        button.green {
            background-color: rgb(0, 196, 39);
            display: flex;
            margin: 2rem auto;
            padding: 0.6rem 1.2rem;
            border-radius: 0.4rem;
            border: none;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;

            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        section button.green:hover {
            background: #00ff11;
            transform: scale(1.08);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

     
        button.green:active {
            transform: scale(0.95);
        }

        .btn-home {
            position: fixed;
            top: 15px;
            left: 15px;
            border: 2px solid #000;
            border-radius: 50%;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: .7;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            transform: scale(1.1);
            opacity: 1;
        }
    </style>
</head>

<body>

    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>06-Specificity</h1>
            <h2>
                Is score/rank that determines which style declaration is ultimately applied to an element.
            </h2>
        </header>

        <section>
            <button class="green">
                Press me
            </button>
        </section>
    </main>

</body>

</html>
