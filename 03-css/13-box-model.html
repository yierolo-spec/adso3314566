<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box-model</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
    figure.mario {
        /* Asegúrate de que la ruta de la imagen sea correcta */
        background: url('imgs/weed.png') no-repeat center / cover;
        border: 4px solid #fff;
        margin: 4rem auto; /* Centrado */
        height: 380px;
        width: 380px;
        position: relative; 
    }

    figure.mario div {
        position: absolute;
        pointer-events: none; /* Para que no interfieran con clics */
    }

    /* CAPA MARGIN (Línea roja punteada) */
    figure.mario .margin {
        top: -20px;
        left: -20px;
        right: -20px;
        bottom: -20px;
        background-color: rgba(255, 107, 107, 0.2); 
        border: 2px dashed #ff6b6b;
    }

    /* CAPA BORDER (Línea azul/cyan) */
    figure.mario .border {
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        background-color: rgba(78, 205, 196, 0.2);
        border: 3px solid #4ecdc4;
    }

    /* CAPA PADDING (Línea amarilla punteada) */
    figure.mario .padding {
        top: 40px;
        left: 40px;
        right: 40px;
        bottom: 40px;
        background-color: rgba(255, 230, 109, 0.2); 
        border: 2px dashed #ffe66d;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ETIQUETAS DE TEXTO */
    .label {
        position: absolute;
        top: 5px; /* Ajuste para que se vea justo bajo la línea superior */
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 2px 8px;
        font-size: 11px;
        border-radius: 4px;
        font-family: Arial, sans-serif;
        text-transform: uppercase;
        font-weight: bold;
    }
</style>
</head>
<body>
    <a href="../03-css/" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        <header>
            <h1>box-model</h1>
            <h2>Is essentially a box that wraps around every html element.</h2>
        </header>
        <section>
            <h3>BOX MODEL </h3>
            <figure class="mario">
    <div class="margin">
        <span class="label">Margin</span>
    </div>
    <div class="border">
        <span class="label">Border</span>
    </div>
    <div class="padding">
        <span class="label">Padding</span>
        <span style="color: white; font-size: 20px;">Content</span>
    </div>
</figure>
            </section>
    </main>
</body>
</html>
