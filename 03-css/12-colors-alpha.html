<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Alpha</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        figure.crash {
            background: url(imgs/weed.png) 
                        no-repeat center /cover;
            border: 4px solid #fff;
            margin-block: 4rem;
            height: 380px;
            width: 380px;
            div {
                height: calc(380px/3);
                &.box1 {
                    background-color: rgba(0, 0, 0, 0.8);

                }
                &.box2 {
                    background-color: #00000077;
                }
                &.box3 {
                    background-color: hsla(0, 100%, 0%, 0.26 );
                
            }
        }
    </style>
        
   
</head>
<body>
    <a href="../03-css/" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        </style>
        <header>
            <h1>colors alpha</h1>
                The alpha value specifies the opacity of a color. It can be a number between 0.0 (fully transparent) and 1.0 (fully opaque).
        </header>
        <section>
            <h3>Example transparent colors:</h3>
            <figure class="crash">
                <div class="box1"></div>  
                <div class="box2"></div> 
                <div class="box3"></div>  
            </figure>
            
            
        </section>
    </main>
</body>
</html>
