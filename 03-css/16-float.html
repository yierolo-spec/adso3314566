<!---->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16-Float</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>

        main { 
            max-width: 900px; 
            margin: 0 auto; }
        
        .box { 
            background: rgb(172, 130, 240); 
            padding: 1rem; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            margin-bottom: 1rem; 
        }

        .box h3 { 
            margin: 0 0 0.8rem 0; 
            font-size: 1rem; 
            color: #333; 
            border-bottom: 2px solid #000000; 
            padding-bottom: 0.5rem; 
        }
        
        .demo { 
            height: 80px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        
        .float-left { 
            float: left; 
            width: 45%; 
            background: #000; 
        }

        .float-right { 
            float: right; 
            width: 45%; 
            background: #000; 
        }

        .clear { 
            clear: both; 
            background: #000; 
            width: 100%; }

    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        <header>
            <h1>16 Float</h1>
            <h2>Pushes the element to either the left or right side.</h2>
        </header>
        <section>
            <div class="box">
                <h3>Float Left</h3>
                <div class="demo float-left">Float Left</div>
            </div>
            <div class="box">
                <h3>Float Right</h3>
                <div class="demo float-right">Float Right</div>
            </div>
            <div class="box">
                <h3>Clear Both</h3>
                <div class="demo clear">Clear Both</div>
        </section>
    </main>
</body>
</html>
